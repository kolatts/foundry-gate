          - heading "The problem" [level=2] [ref=e50]
          - paragraph [ref=e51]: "Your team has Azure AI Foundry deployed. Developers need API keys to hit it through APIM. But there’s no built-in way to:"
          - list [ref=e52]:
            - listitem [ref=e53]:
              - text: Give each developer or group a
              - strong [ref=e54]: monthly token budget
              - text: that actually enforces
            - listitem [ref=e55]:
              - strong [ref=e56]: Provision and revoke
              - text: APIM subscription keys without portal access
            - listitem [ref=e57]:
              - text: Let developers
              - strong [ref=e58]: self-serve quota increases
              - text: with an approval workflow
            - listitem [ref=e59]: See at a glance who is burning tokens and who is hard-stopped
          - paragraph [ref=e60]: FoundryGate is the missing operations layer.
          - heading "How it works" [level=2] [ref=e61]
          - generic [ref=e62]:
            - article [ref=e63]:
              - paragraph [ref=e64]:
                - img [ref=e65]
                - generic [ref=e67]: Per-developer quotas
              - paragraph [ref=e69]:
                - text: "Five-level quota resolution: individual override → group policy → system default. When a developer hits their limit, their APIM subscription is"
                - strong [ref=e70]: suspended
                - text: — not just flagged.
            - article [ref=e71]:
              - paragraph [ref=e72]:
                - img [ref=e73]
                - generic [ref=e74]: APIM key lifecycle
              - paragraph [ref=e76]: Admins provision, rotate, and revoke Azure API Management subscription keys without touching the portal. Developers can rotate their own key from the self-service dashboard.
            - article [ref=e77]:
              - paragraph [ref=e78]:
                - img [ref=e79]
                - generic [ref=e81]: Monthly hard reset
              - paragraph [ref=e83]: An Azure Function fires at 00:01 UTC on the 1st. Every active developer gets a fresh allocation. Suspended subscriptions are automatically re-enabled.
            - article [ref=e84]:
              - paragraph [ref=e85]:
                - img [ref=e86]
                - generic [ref=e88]: Foundry model management
              - paragraph [ref=e90]: Admins can deploy and remove Azure AI Foundry model deployments from the FoundryGate UI. New deployments are immediately reachable via existing keys — no APIM changes needed.
