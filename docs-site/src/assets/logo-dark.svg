<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 44" width="192" height="44">
  <!-- Gateway icon: outer frame -->
  <rect x="2" y="2" width="40" height="40" rx="4" fill="none" stroke="rgba(232,238,245,0.9)" stroke-width="2"/>
  <!-- Perspective corner rails -->
  <line x1="2"  y1="2"  x2="13" y2="13" stroke="#4DCFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="42" y1="2"  x2="31" y2="13" stroke="#4DCFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="2"  y1="42" x2="13" y2="31" stroke="#4DCFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="42" y1="42" x2="31" y2="31" stroke="#4DCFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Inner frame -->
  <rect x="13" y="13" width="18" height="18" rx="2" fill="rgba(0,120,212,0.12)" stroke="#4DCFFF" stroke-width="1.5"/>
  <!-- Center glow -->
  <circle cx="22" cy="22" r="2.5" fill="#4DCFFF"/>
  <circle cx="22" cy="22" r="4.5" fill="rgba(77,207,255,0.25)"/>

  <!-- "foundry" -->
  <text x="54" y="28"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="600" letter-spacing="-0.3"
    fill="#E8EEF5">foundry</text>

  <!-- "|" separator -->
  <text x="126" y="28"
    font-family="Inter, system-ui, sans-serif"
    font-size="16" font-weight="300"
    fill="#4DCFFF"> | </text>

  <!-- "gate" -->
  <text x="148" y="28"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="600" letter-spacing="-0.3"
    fill="#E8EEF5">gate</text>
</svg>
